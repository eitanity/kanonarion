# Dependabot keeps the GitHub Actions pinned in .github/workflows up to date.
#
# Every action is pinned to a full commit SHA (with a trailing "# vX" comment)
# so a moved tag cannot change what runs — see the pinning rationale in
# release.yml. Dependabot preserves that hash-lock: it bumps the SHA and the
# version comment together in a reviewed PR, so updates stay pinned rather than
# drifting to a floating tag. This is the "pinned dependency automation" half of
# KN-160; branch protection and the signed-commit policy are configured out of
# band on the repo settings.
version: 2
updates:
  - package-ecosystem: "github-actions"
    # "/" scans .github/workflows for `uses:` entries; the directory is the repo
    # root regardless of where the workflow files live.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Keep the hash-locked pins: rebase SHA bumps cleanly onto the branch.
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    # Batch action bumps into a single weekly PR to cut review churn while still
    # surfacing every SHA change for inspection. Majors are grouped too — the
    # SHA+comment diff makes the version jump explicit in review.
    groups:
      github-actions:
        patterns:
          - "*"
