name: Fuzz

# Continuous fuzzing. The in-tree f.Add seeds are the
# persistent seed corpora; any crasher Go discovers is written to
# testdata/fuzz/<FuzzName>/<id>. Download the crasher artifact, commit it, and
# the existing `test` job replays it forever as a regression case.

on:
  schedule:
    # 03:17 UTC daily — off-peak, avoids the top-of-hour runner contention.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Per-target fuzz budget (Go duration, e.g. 5m)"
        required: false
        default: "5m"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: no token scopes by default; each job opts into exactly what
# it needs. Third-party actions pinned to full commit SHAs (trailing '# vX' is
# the tag the SHA resolved from) so a moved tag cannot change what runs.
permissions: {}

jobs:
  discover:
    name: Discover fuzz packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: find
        name: Enumerate packages with fuzz targets
        run: |
          pkgs=$(git grep -l '^func Fuzz' \
            | xargs -n1 dirname | sort -u | sed 's#^#./#')
          json=$(printf '%s\n' "$pkgs" | jq -R . | jq -cs '{pkg: .}')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Fuzzing packages:" && printf '%s\n' "$pkgs"

  fuzz:
    name: Fuzz ${{ matrix.pkg }}
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run every fuzz target in the package
        env:
          FUZZTIME: ${{ github.event.inputs.fuzztime || '5m' }}
        run: |
          failed=""
          for fn in $(go test -list '^Fuzz' "${{ matrix.pkg }}" | grep '^Fuzz'); do
            echo "::group::${{ matrix.pkg }} $fn (fuzztime=$FUZZTIME)"
            if ! go test -run='^$' -fuzz="^$fn$" -fuzztime="$FUZZTIME" \
                -test.timeout=20m "${{ matrix.pkg }}"; then
              failed="$failed $fn"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::fuzz failures in ${{ matrix.pkg }}:$failed"
            exit 1
          fi

      - name: Upload discovered crashers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers-${{ strategy.job-index }}
          path: |
            **/testdata/fuzz/**
          if-no-files-found: ignore
          retention-days: 30
