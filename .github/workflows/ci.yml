name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: no token scopes by default; each job opts into exactly
# what it needs. Third-party actions are pinned to full commit SHAs (the
# trailing '# vX' is the human-readable tag the SHA resolved from) so a moved
# tag can never silently change what runs. Dependabot's github-actions
# ecosystem keeps these SHAs current.
permissions: {}

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        # Pinned to the exact patch the go.mod 'go' directive requires
        # (bumped to 1.26.5 for GO-2026-4970). A floating '1.26.x' can resolve
        # setup-go to an older manifest patch, which then triggers an in-CI
        # GOTOOLCHAIN download to satisfy the directive — needless and fragile
        # under the hardened egress allowlist. Bump this in lockstep with go.mod.
        go: ["1.26.5"]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      # Single instrumented run: the whole suite executes once under -race with
      # coverage collected in the same pass. atomic mode is required because
      # -race runs tests concurrently. This is both the race gate and the
      # coverage source — there is no separate coverage job.
      - name: Run tests with race and coverage
        run: |
          go test -race -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./... \
            ./...

      - name: Report and enforce coverage floor
        run: |
          go tool cover -func=coverage.out | tee /tmp/coverage.txt
          {
            echo "## Coverage (All packages)"
            echo '```'
            cat /tmp/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          TOTAL=$(grep "^total:" /tmp/coverage.txt | awk '{print $3}' | tr -d '%')
          FLOOR=75
          if awk -v t="$TOTAL" -v f="$FLOOR" 'BEGIN { if (t+0 < f+0) exit 0; exit 1 }'; then
            echo "::error::Coverage ${TOTAL}% is below baseline floor ${FLOOR}% — fix regressions before merging"
            exit 1
          fi
          echo "Coverage ${TOTAL}% meets baseline floor ${FLOOR}%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          set -euo pipefail
          # Build the version pinned in go.mod's tool block (reproducible), not
          # @latest — a floating @latest is the one unpinned pipeline dependency
          # and would let a new golangci-lint release change CI results (or ship
          # compromised code) without a reviewed go.mod bump. Mirrors the
          # govulncheck install in release.yml.
          BIN="$(go env GOPATH)/bin"
          mkdir -p "$BIN"
          go build -o "$BIN/golangci-lint" github.com/golangci/golangci-lint/v2/cmd/golangci-lint
          echo "$BIN" >> "$GITHUB_PATH"

      - name: golangci-lint
        run: golangci-lint run ./...

  restricted_imports:
    name: Restricted Imports Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check for restricted imports in extraction packages
        run: |
          RESTRICTED="os/exec|plugin|syscall|unsafe"
          PACKAGES="./internal/license/... ./internal/iface/... ./internal/callgraph/... ./internal/example/..."
          FOUND=$(go list -f '{{.ImportPath}} {{join .Imports " "}}' $PACKAGES | grep -E " ($RESTRICTED)" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Restricted imports found in extraction packages:"
            echo "$FOUND"
            exit 1
          fi
          echo "No restricted imports found."

  benchmarks:
    name: Resource Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run benchmarks
        run: |
          go test -bench . -benchmem ./internal/iface/... ./internal/callgraph/... | tee /tmp/bench.txt
      - name: Summary
        run: |
          {
            echo "## Resource Benchmarks"
            echo '```'
            cat /tmp/bench.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
